    expected_tool: gitlab_create_issue
    category: direct

  - id: gl_003
    prompt: "Show merge requests for the backend/api-gateway project on GitLab"
    expected_tool: gitlab_list_merge_requests
    category: direct

  - id: gl_004
    prompt: "Get details of merge request !23 in backend/api-gateway on GitLab"
    expected_tool: gitlab_get_merge_request
    category: direct

  - id: gl_005
    prompt: "Create a merge request from fix/cors to main in the GitLab project backend/api-gateway"
    expected_tool: gitlab_create_merge_request
    category: direct

  - id: gl_006
    prompt: "Show the README.md from the backend/api-gateway GitLab repo"
    expected_tool: gitlab_get_file_content
    category: direct

  - id: gl_007
    prompt: "List branches in the backend/api-gateway GitLab project"
    expected_tool: gitlab_list_branches
    category: direct

  - id: gl_008
    prompt: "Show recent commits in the backend/api-gateway GitLab project"
    expected_tool: gitlab_list_commits
    category: direct

  - id: gl_009
    prompt: "What's the pipeline status for the backend/api-gateway GitLab project?"
    expected_tool: gitlab_get_pipelines
