# Benchmark prompts with expected correct tool calls
# Categories:
#   - direct: clear, unambiguous request
#   - ambiguous: could match multiple tools (tests cross-tool confusion)
#   - multi_step: requires understanding context to pick the right tool

prompts:
  # === GitHub (direct) ===
  - id: gh_001
    prompt: "List all open issues in the sixdegree-ai/platform repo"
    expected_tool: github_list_issues
    category: direct

  - id: gh_002
    prompt: "Create a bug report issue in sixdegree-ai/platform titled 'API timeout on /completions'"
    expected_tool: github_create_issue
    category: direct

  - id: gh_003
    prompt: "Show me the open pull requests on the platform repo"
    expected_tool: github_list_pull_requests
    category: direct

  - id: gh_004
    prompt: "Get the details of PR #142 in sixdegree-ai/platform"
    expected_tool: github_get_pull_request
    category: direct

  - id: gh_005
    prompt: "Create a pull request from feature/auth to main in sixdegree-ai/platform"
    expected_tool: github_create_pull_request
    category: direct

  - id: gh_006
    prompt: "Search for usages of 'DisclosureTracker' in the platform repo"
    expected_tool: github_search_code
    category: direct

  - id: gh_007
    prompt: "Show me the contents of pkg/handlers/completions_stream.go in the platform repo"
    expected_tool: github_get_file_content
    category: direct

  - id: gh_008
    prompt: "What branches exist in sixdegree-ai/platform?"
    expected_tool: github_list_branches
    category: direct

  - id: gh_009
    prompt: "Show recent commits on the main branch of sixdegree-ai/platform"
    expected_tool: github_list_commits
    category: direct

  - id: gh_010
    prompt: "Add a comment to issue #55 saying 'Fixed in v2.3.1'"
    expected_tool: github_add_comment
    category: direct

  - id: gh_011
    prompt: "Get repository info for sixdegree-ai/platform including star count"
    expected_tool: github_get_repository
    category: direct

  # === GitLab (direct) ===
  - id: gl_001
