  # === Snyk (direct) ===
  - id: sn_001
    prompt: "List all Snyk projects in our organization"
    expected_tool: snyk_list_projects
    category: direct

  - id: sn_002
    prompt: "Show critical vulnerabilities across our Snyk projects"
    expected_tool: snyk_search_vulnerabilities
    category: direct

  - id: sn_003
    prompt: "Run a security scan on the platform project in Snyk"
    expected_tool: snyk_test_project
    category: direct

  - id: sn_004
    prompt: "How do I fix the vulnerabilities in project proj-123?"
    expected_tool: snyk_get_remediation
    category: direct

  - id: sn_005
    prompt: "Scan the nginx:1.25 container image for vulnerabilities"
    expected_tool: snyk_scan_container_image
