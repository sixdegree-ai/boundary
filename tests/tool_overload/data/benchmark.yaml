  - id: k8s_002
    prompt: "Show deployments in the staging namespace"
    expected_tool: k8s_list_deployments
    category: direct

  - id: k8s_003
    prompt: "List pods in the production namespace"
    expected_tool: k8s_list_pods
    category: direct

  - id: k8s_004
    prompt: "Get details for the pod api-server-7f8b9c in production"
