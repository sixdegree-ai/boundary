  # === Cross-tool confusion (ambiguous) ===
  - id: amb_001
    prompt: "Show me the open issues on the platform repo"
    expected_tool: github_list_issues
    category: ambiguous
    notes: "Could be GitHub or GitLab - LLM must decide based on context"

  - id: amb_002
    prompt: "Create a merge request from feature/auth to main"
    expected_tool: gitlab_create_merge_request
    category: ambiguous
    notes: "'merge request' is GitLab terminology, but LLM might pick GitHub"

  - id: amb_003
    prompt: "List open PRs on the backend project"
    expected_tool: github_list_pull_requests
    category: ambiguous
    notes: "'PR' is GitHub terminology but prompt doesn't specify platform"

  - id: amb_004
    prompt: "Show me the CI/CD pipeline status for the api-gateway project"
    expected_tool: gitlab_get_pipelines
    category: ambiguous
    notes: "CI/CD pipelines are a GitLab concept, but GitHub Actions exist too"

  - id: amb_005
    prompt: "File a bug about the login timeout"
    expected_tool: github_create_issue
    category: ambiguous
    notes: "No platform specified, could be GitHub or GitLab issue"

  - id: amb_006
    prompt: "Show me the source code for the auth middleware"
    expected_tool: github_get_file_content
    category: ambiguous
    notes: "Could use GitHub or GitLab file content tool"

  - id: amb_007
    prompt: "Comment on the code review for the auth fix"
    expected_tool: github_add_comment
    category: ambiguous
    notes: "'code review' could be a PR comment or MR note"

  - id: amb_008
    prompt: "Who is on call right now and what incidents are open?"
    expected_tool: pd_get_oncall
    category: ambiguous
    notes: "Involves two PagerDuty tools but should pick the most relevant first"

  - id: amb_009
    prompt: "Notify the team about the deployment"
    expected_tool: slack_send_message
    category: ambiguous
    notes: "Could be Slack message, GitHub comment, etc."

  - id: amb_010
    prompt: "Check the security posture of our container deployments"
    expected_tool: snyk_list_container_projects
    category: ambiguous
    notes: "Could use Snyk or Kubernetes tools"

  # === Context-dependent (requires understanding which platform) ===
  - id: ctx_001
    prompt: "The backend/api-gateway project has a broken pipeline, show me the status"
    expected_tool: gitlab_get_pipelines
    category: ambiguous
    notes: "Path format 'group/project' implies GitLab"

  - id: ctx_002
    prompt: "Check if there are any pods crashing in production and show me the logs"
    expected_tool: k8s_list_pods
    category: ambiguous
    notes: "Multi-step but should start with listing pods"

  - id: ctx_003
    prompt: "The sixdegree-ai/platform repo needs a new issue for the Slack integration bug"
    expected_tool: github_create_issue
    category: ambiguous
    notes: "'sixdegree-ai/owner' format implies GitHub"

  - id: ctx_004
    prompt: "Find out who has access to the production systems"
    expected_tool: okta_list_groups
    category: ambiguous
    notes: "Access management question should route to Okta"

  - id: ctx_005
    prompt: "There's a new CVE affecting our Node.js dependencies, check our exposure"
    expected_tool: snyk_search_vulnerabilities
    category: ambiguous
    notes: "Vulnerability question should route to Snyk"
