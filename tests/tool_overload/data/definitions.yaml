# Tool definitions for benchmarking
# Each tool has a name, description, and parameters
# These are no-op tools used only for testing tool selection accuracy

tools:
  # === GitHub Tools ===
  - name: github_get_repository
    description: Get detailed information about a GitHub repository including description, stars, forks, issues, and more
    parameters:
      owner: { type: string, required: true, description: "Repository owner" }
      name: { type: string, required: true, description: "Repository name" }

  - name: github_list_issues
    description: List issues in a GitHub repository with optional filtering by state and labels
    parameters:
      owner: { type: string, required: true, description: "Repository owner" }
      name: { type: string, required: true, description: "Repository name" }
      state: { type: string, required: false, description: "Filter by state (open, closed, all)" }
      labels: { type: string, required: false, description: "Comma-separated list of labels" }

  - name: github_create_issue
    description: Create a new issue in a GitHub repository
    parameters:
      owner: { type: string, required: true, description: "Repository owner" }
      name: { type: string, required: true, description: "Repository name" }
      title: { type: string, required: true, description: "Issue title" }
      body: { type: string, required: false, description: "Issue body" }

  - name: github_list_pull_requests
    description: List pull requests in a GitHub repository with optional filtering
    parameters:
      owner: { type: string, required: true, description: "Repository owner" }
      name: { type: string, required: true, description: "Repository name" }
      state: { type: string, required: false, description: "Filter by state" }

  - name: github_get_pull_request
    description: Get detailed information about a specific pull request including diff stats, reviews, and checks
    parameters:
      owner: { type: string, required: true, description: "Repository owner" }
      name: { type: string, required: true, description: "Repository name" }
      number: { type: integer, required: true, description: "Pull request number" }

  - name: github_create_pull_request
    description: Create a new pull request in a GitHub repository
    parameters:
      owner: { type: string, required: true, description: "Repository owner" }
      name: { type: string, required: true, description: "Repository name" }
      title: { type: string, required: true, description: "PR title" }
      head: { type: string, required: true, description: "Branch to merge from" }
      base: { type: string, required: true, description: "Branch to merge into" }
      body: { type: string, required: false, description: "PR body" }

  - name: github_search_code
    description: Search for code across GitHub repositories
    parameters:
      owner: { type: string, required: true, description: "Repository owner" }
      name: { type: string, required: true, description: "Repository name" }
      query: { type: string, required: true, description: "Search query" }

  - name: github_get_file_content
    description: Get the content of a file from a GitHub repository
    parameters:
      owner: { type: string, required: true, description: "Repository owner" }
      name: { type: string, required: true, description: "Repository name" }
      path: { type: string, required: true, description: "File path" }

  - name: github_list_branches
    description: List branches in a GitHub repository
    parameters:
      owner: { type: string, required: true, description: "Repository owner" }
      name: { type: string, required: true, description: "Repository name" }

  - name: github_list_commits
    description: List commits in a GitHub repository
    parameters:
      owner: { type: string, required: true, description: "Repository owner" }
      name: { type: string, required: true, description: "Repository name" }
      sha: { type: string, required: false, description: "Branch or commit SHA" }

  - name: github_add_comment
    description: Add a comment to an issue or pull request
    parameters:
      owner: { type: string, required: true, description: "Repository owner" }
      name: { type: string, required: true, description: "Repository name" }
      number: { type: integer, required: true, description: "Issue or PR number" }
      body: { type: string, required: true, description: "Comment body" }

  # === GitLab Tools ===
  - name: gitlab_get_project
    description: Get detailed information about a GitLab project including description, stars, forks, issues, and more
    parameters:
      fullPath: { type: string, required: true, description: "Full path of the project (e.g. group/project)" }

  - name: gitlab_list_issues
    description: List issues in a GitLab project with optional filtering by state and labels
    parameters:
      fullPath: { type: string, required: true, description: "Full path of the project" }
      state: { type: string, required: false, description: "Filter by state" }
      labels: { type: string, required: false, description: "Comma-separated labels" }

  - name: gitlab_create_issue
    description: Create a new issue in a GitLab project
    parameters:
      fullPath: { type: string, required: true, description: "Full path of the project" }
      title: { type: string, required: true, description: "Issue title" }
      description: { type: string, required: false, description: "Issue description" }

  - name: gitlab_list_merge_requests
    description: List merge requests in a GitLab project with optional filtering
    parameters:
      fullPath: { type: string, required: true, description: "Full path of the project" }
      state: { type: string, required: false, description: "Filter by state" }

  - name: gitlab_get_merge_request
    description: Get detailed information about a specific merge request including diff stats, approvals, and pipeline status
    parameters:
      fullPath: { type: string, required: true, description: "Full path of the project" }
      iid: { type: integer, required: true, description: "Merge request IID" }

  - name: gitlab_create_merge_request
    description: Create a new merge request in a GitLab project
    parameters:
      fullPath: { type: string, required: true, description: "Full path of the project" }
      title: { type: string, required: true, description: "MR title" }
      sourceBranch: { type: string, required: true, description: "Source branch" }
      targetBranch: { type: string, required: true, description: "Target branch" }
      description: { type: string, required: false, description: "MR description" }

  - name: gitlab_get_file_content
    description: Get the content of a file from a GitLab repository
    parameters:
      fullPath: { type: string, required: true, description: "Full path of the project" }
      filePath: { type: string, required: true, description: "Path to the file" }

  - name: gitlab_list_branches
    description: List branches in a GitLab project
    parameters:
      fullPath: { type: string, required: true, description: "Full path of the project" }

  - name: gitlab_list_commits
    description: List commits in a GitLab project
    parameters:
      fullPath: { type: string, required: true, description: "Full path of the project" }

  - name: gitlab_get_pipelines
    description: List CI/CD pipelines for a GitLab project
    parameters:
      fullPath: { type: string, required: true, description: "Full path of the project" }

  - name: gitlab_add_note
    description: Add a note (comment) to an issue or merge request
    parameters:
      fullPath: { type: string, required: true, description: "Full path of the project" }
      noteableType: { type: string, required: true, description: "Type (Issue or MergeRequest)" }
      noteableIid: { type: integer, required: true, description: "Issue or MR IID" }
      body: { type: string, required: true, description: "Note body" }

  # === Kubernetes Tools ===
  - name: k8s_list_namespaces
    description: List all namespaces in the cluster
    parameters: {}

  - name: k8s_list_deployments
    description: List deployments in a namespace
    parameters:
      namespace: { type: string, required: true, description: "Kubernetes namespace" }

  - name: k8s_list_pods
    description: List pods in a namespace
    parameters:
      namespace: { type: string, required: true, description: "Kubernetes namespace" }

  - name: k8s_get_pod
    description: Get details of a specific pod
    parameters:
      namespace: { type: string, required: true, description: "Kubernetes namespace" }
      name: { type: string, required: true, description: "Pod name" }

  - name: k8s_get_pod_logs
    description: Get logs from a pod
    parameters:
      namespace: { type: string, required: true, description: "Kubernetes namespace" }
      name: { type: string, required: true, description: "Pod name" }
      container: { type: string, required: false, description: "Container name" }

  - name: k8s_scale_deployment
    description: Scale a deployment to a specific number of replicas
    parameters:
      namespace: { type: string, required: true, description: "Kubernetes namespace" }
      name: { type: string, required: true, description: "Deployment name" }
      replicas: { type: integer, required: true, description: "Number of replicas" }

  - name: k8s_restart_deployment
    description: Restart a deployment by updating its restart annotation
    parameters:
      namespace: { type: string, required: true, description: "Kubernetes namespace" }
      name: { type: string, required: true, description: "Deployment name" }

  - name: k8s_get_cluster_info
    description: Get cluster information and health status
    parameters: {}

  - name: k8s_list_services
    description: List services in a namespace
    parameters:
      namespace: { type: string, required: true, description: "Kubernetes namespace" }

  - name: k8s_list_ingresses
    description: List ingresses in a namespace
    parameters:
      namespace: { type: string, required: true, description: "Kubernetes namespace" }

  # === Slack Tools ===
  - name: slack_send_message
    description: Send a message to a Slack channel
    parameters:
      channel: { type: string, required: true, description: "Channel name or ID" }
      text: { type: string, required: true, description: "Message text" }

  - name: slack_list_channels
    description: List Slack channels
    parameters: {}

  - name: slack_get_channel_history
    description: Get recent messages from a channel
    parameters:
      channel: { type: string, required: true, description: "Channel name or ID" }
      limit: { type: integer, required: false, description: "Number of messages" }

  - name: slack_create_channel
    description: Create a new Slack channel
    parameters:
      name: { type: string, required: true, description: "Channel name" }

  - name: slack_invite_to_channel
    description: Invite users to a channel
    parameters:
      channel: { type: string, required: true, description: "Channel name or ID" }
      users: { type: string, required: true, description: "Comma-separated user IDs" }

  - name: slack_get_user_info
    description: Get information about a Slack user
    parameters:
      user: { type: string, required: true, description: "User ID" }

  # === PagerDuty Tools ===
  - name: pd_create_incident
    description: Create a new PagerDuty incident
    parameters:
      service_id: { type: string, required: true, description: "Service ID" }
      title: { type: string, required: true, description: "Incident title" }
      urgency: { type: string, required: false, description: "high or low" }

  - name: pd_acknowledge_incident
    description: Acknowledge an incident
    parameters:
      incident_id: { type: string, required: true, description: "Incident ID" }

  - name: pd_resolve_incident
    description: Resolve an incident
    parameters:
      incident_id: { type: string, required: true, description: "Incident ID" }

  - name: pd_list_incidents
    description: List PagerDuty incidents
    parameters:
      status: { type: string, required: false, description: "Filter by status" }

  - name: pd_get_oncall
    description: Get who is currently on-call for a service or schedule
    parameters:
      schedule_id: { type: string, required: false, description: "Schedule ID" }

  - name: pd_add_note
    description: Add a note to an incident
    parameters:
      incident_id: { type: string, required: true, description: "Incident ID" }
      content: { type: string, required: true, description: "Note content" }

  - name: pd_trigger_incident
    description: Trigger an incident via Events API v2
    parameters:
      routing_key: { type: string, required: true, description: "Integration routing key" }
      summary: { type: string, required: true, description: "Event summary" }
      severity: { type: string, required: true, description: "critical, error, warning, or info" }

  # === Okta Tools ===
  - name: okta_list_users
    description: List Okta users, optionally filtered by search query (name, email, department)
    parameters:
      search: { type: string, required: false, description: "Search query" }

  - name: okta_get_user
    description: Get a specific Okta user by ID or login (email)
    parameters:
      user_id: { type: string, required: true, description: "User ID or email" }

  - name: okta_get_user_groups
    description: Get all groups a user belongs to
    parameters:
      user_id: { type: string, required: true, description: "User ID" }

  - name: okta_list_groups
    description: List Okta groups, optionally filtered by name prefix
    parameters:
      query: { type: string, required: false, description: "Group name prefix" }

  - name: okta_get_group_members
    description: Get all members of an Okta group
    parameters:
      group_id: { type: string, required: true, description: "Group ID" }

  # === Snyk Tools ===
  - name: snyk_list_projects
    description: List all projects in a Snyk organization
    parameters:
      org_id: { type: string, required: true, description: "Organization ID" }

  - name: snyk_get_project
    description: Get detailed information about a specific project
    parameters:
      org_id: { type: string, required: true, description: "Organization ID" }
      project_id: { type: string, required: true, description: "Project ID" }

  - name: snyk_search_vulnerabilities
    description: Search for vulnerabilities across projects
    parameters:
      org_id: { type: string, required: true, description: "Organization ID" }
      severity: { type: string, required: false, description: "Filter by severity" }

  - name: snyk_test_project
    description: Trigger a new security test/scan for a project
    parameters:
      org_id: { type: string, required: true, description: "Organization ID" }
      project_id: { type: string, required: true, description: "Project ID" }

  - name: snyk_get_remediation
    description: Get remediation advice for vulnerabilities
    parameters:
      org_id: { type: string, required: true, description: "Organization ID" }
      project_id: { type: string, required: true, description: "Project ID" }

  - name: snyk_list_organizations
    description: List all Snyk organizations the token has access to
    parameters: {}

  - name: snyk_scan_container_image
    description: Scan a container image for vulnerabilities
    parameters:
      org_id: { type: string, required: true, description: "Organization ID" }
      image: { type: string, required: true, description: "Container image (e.g. nginx:latest)" }

  - name: snyk_list_container_projects
    description: List all container image projects in an organization
    parameters:
      org_id: { type: string, required: true, description: "Organization ID" }

  - name: snyk_scan_iac_file
    description: Scan an Infrastructure as Code file for misconfigurations
    parameters:
      org_id: { type: string, required: true, description: "Organization ID" }
      file_path: { type: string, required: true, description: "Path to IaC file" }

  - name: snyk_list_iac_projects
    description: List all IaC projects in an organization
    parameters:
      org_id: { type: string, required: true, description: "Organization ID" }

  # === Datadog Tools ===
  - name: datadog_list_monitors
    description: List all Datadog monitors with optional filtering by tags or status
    parameters:
      tags: { type: string, required: false, description: "Comma-separated tags to filter by" }

  - name: datadog_get_monitor
    description: Get details of a specific Datadog monitor including status and alert conditions
    parameters:
      monitor_id: { type: string, required: true, description: "Monitor ID" }

  - name: datadog_create_monitor
    description: Create a new Datadog monitor with a query and alert thresholds
    parameters:
      name: { type: string, required: true, description: "Monitor name" }
      query: { type: string, required: true, description: "Monitor query" }
      type: { type: string, required: true, description: "Monitor type (metric, service check, event, etc.)" }

  - name: datadog_mute_monitor
    description: Mute a Datadog monitor to suppress notifications
    parameters:
      monitor_id: { type: string, required: true, description: "Monitor ID" }
      end: { type: string, required: false, description: "Mute end timestamp" }

  - name: datadog_search_events
    description: Search Datadog events by query string and time range
    parameters:
      query: { type: string, required: true, description: "Event search query" }
      start: { type: string, required: false, description: "Start time" }
      end: { type: string, required: false, description: "End time" }

  - name: datadog_get_metrics
    description: Query Datadog metric timeseries data
    parameters:
      query: { type: string, required: true, description: "Metrics query" }
      from_ts: { type: string, required: true, description: "Start timestamp" }
      to_ts: { type: string, required: true, description: "End timestamp" }

  - name: datadog_list_dashboards
    description: List all Datadog dashboards
    parameters: {}

  - name: datadog_get_dashboard
    description: Get a specific Datadog dashboard by ID
    parameters:
      dashboard_id: { type: string, required: true, description: "Dashboard ID" }

  - name: datadog_create_downtime
    description: Schedule a Datadog downtime window for maintenance
    parameters:
      scope: { type: string, required: true, description: "Downtime scope (e.g. host:myhost)" }
      start: { type: string, required: true, description: "Downtime start timestamp" }
      end: { type: string, required: false, description: "Downtime end timestamp" }
      message: { type: string, required: false, description: "Downtime message" }

  - name: datadog_list_hosts
    description: List all hosts reporting to Datadog with optional filtering
    parameters:
      filter: { type: string, required: false, description: "Filter string" }

  - name: datadog_get_slo
    description: Get details and status of a Datadog Service Level Objective
    parameters:
      slo_id: { type: string, required: true, description: "SLO ID" }

  - name: datadog_list_logs
    description: Search and list Datadog log entries
    parameters:
      query: { type: string, required: true, description: "Log search query" }
      from_ts: { type: string, required: false, description: "Start timestamp" }
      to_ts: { type: string, required: false, description: "End timestamp" }
      limit: { type: integer, required: false, description: "Max results" }

  # === Jira Tools ===
  - name: jira_search_issues
    description: Search Jira issues using JQL query syntax
    parameters:
      jql: { type: string, required: true, description: "JQL query string" }
      max_results: { type: integer, required: false, description: "Max results to return" }

  - name: jira_get_issue
    description: Get detailed information about a specific Jira issue
    parameters:
      issue_key: { type: string, required: true, description: "Issue key (e.g. PROJ-123)" }

  - name: jira_create_issue
    description: Create a new Jira issue in a project
    parameters:
      project_key: { type: string, required: true, description: "Project key" }
      summary: { type: string, required: true, description: "Issue summary" }
      issue_type: { type: string, required: true, description: "Issue type (Bug, Story, Task, etc.)" }
      description: { type: string, required: false, description: "Issue description" }

  - name: jira_update_issue
    description: Update fields on an existing Jira issue
    parameters:
      issue_key: { type: string, required: true, description: "Issue key" }
      fields: { type: string, required: true, description: "JSON fields to update" }

  - name: jira_add_comment
    description: Add a comment to a Jira issue
    parameters:
      issue_key: { type: string, required: true, description: "Issue key" }
      body: { type: string, required: true, description: "Comment body" }

  - name: jira_transition_issue
    description: Transition a Jira issue to a new status (e.g. In Progress, Done)
    parameters:
      issue_key: { type: string, required: true, description: "Issue key" }
      transition_id: { type: string, required: true, description: "Transition ID" }

  - name: jira_assign_issue
    description: Assign a Jira issue to a user
    parameters:
      issue_key: { type: string, required: true, description: "Issue key" }
      account_id: { type: string, required: true, description: "Assignee account ID" }

  - name: jira_list_projects
    description: List all Jira projects accessible to the current user
    parameters: {}

  - name: jira_get_sprint
    description: Get details of a Jira sprint including its issues
    parameters:
      sprint_id: { type: string, required: true, description: "Sprint ID" }

  - name: jira_list_sprints
    description: List sprints for a Jira board
    parameters:
      board_id: { type: string, required: true, description: "Board ID" }
      state: { type: string, required: false, description: "Filter by state (active, closed, future)" }

  # === Confluence Tools ===
  - name: confluence_search
    description: Search Confluence content using CQL query syntax
    parameters:
      cql: { type: string, required: true, description: "CQL query string" }
      limit: { type: integer, required: false, description: "Max results" }

  - name: confluence_get_page
    description: Get a Confluence page by ID including its content
    parameters:
      page_id: { type: string, required: true, description: "Page ID" }

  - name: confluence_create_page
    description: Create a new Confluence page in a space
    parameters:
      space_key: { type: string, required: true, description: "Space key" }
      title: { type: string, required: true, description: "Page title" }
      body: { type: string, required: true, description: "Page body (wiki markup or HTML)" }
      parent_id: { type: string, required: false, description: "Parent page ID" }

  - name: confluence_update_page
    description: Update the content of an existing Confluence page
    parameters:
      page_id: { type: string, required: true, description: "Page ID" }
      title: { type: string, required: true, description: "Page title" }
      body: { type: string, required: true, description: "Updated page body" }
      version: { type: integer, required: true, description: "Current version number (for conflict detection)" }

  - name: confluence_list_spaces
    description: List all Confluence spaces
    parameters: {}

  - name: confluence_get_comments
    description: Get comments on a Confluence page
    parameters:
      page_id: { type: string, required: true, description: "Page ID" }

  - name: confluence_add_comment
    description: Add a comment to a Confluence page
    parameters:
      page_id: { type: string, required: true, description: "Page ID" }
      body: { type: string, required: true, description: "Comment body" }

  # === AWS Tools ===
  - name: aws_list_ec2_instances
    description: List EC2 instances with optional filtering by tags or state
    parameters:
      filters: { type: string, required: false, description: "JSON filters array" }
      region: { type: string, required: false, description: "AWS region" }

  - name: aws_get_ec2_instance
    description: Get detailed information about a specific EC2 instance
    parameters:
      instance_id: { type: string, required: true, description: "EC2 instance ID" }
      region: { type: string, required: false, description: "AWS region" }

  - name: aws_list_s3_buckets
    description: List all S3 buckets in the account
    parameters: {}

  - name: aws_list_s3_objects
    description: List objects in an S3 bucket with optional prefix filter
    parameters:
      bucket: { type: string, required: true, description: "Bucket name" }
      prefix: { type: string, required: false, description: "Key prefix filter" }

  - name: aws_get_cloudwatch_metrics
    description: Get CloudWatch metric statistics for a resource
    parameters:
      namespace: { type: string, required: true, description: "CloudWatch namespace" }
      metric_name: { type: string, required: true, description: "Metric name" }
      dimensions: { type: string, required: true, description: "JSON dimensions" }
      period: { type: integer, required: false, description: "Period in seconds" }

  - name: aws_list_lambda_functions
    description: List all Lambda functions in a region
    parameters:
      region: { type: string, required: false, description: "AWS region" }

  - name: aws_invoke_lambda
    description: Invoke a Lambda function synchronously
    parameters:
      function_name: { type: string, required: true, description: "Lambda function name or ARN" }
      payload: { type: string, required: false, description: "JSON payload" }

  - name: aws_list_rds_instances
    description: List all RDS database instances
    parameters:
      region: { type: string, required: false, description: "AWS region" }

  - name: aws_describe_alarms
    description: List CloudWatch alarms with optional state filter
    parameters:
      state: { type: string, required: false, description: "Filter by state (OK, ALARM, INSUFFICIENT_DATA)" }
      region: { type: string, required: false, description: "AWS region" }

  - name: aws_get_secret
    description: Retrieve a secret value from AWS Secrets Manager
    parameters:
      secret_id: { type: string, required: true, description: "Secret name or ARN" }
      region: { type: string, required: false, description: "AWS region" }

  # === Grafana Tools ===
  - name: grafana_list_dashboards
    description: List all Grafana dashboards with optional folder and tag filtering
    parameters:
      folder_id: { type: string, required: false, description: "Folder ID to filter by" }
      tag: { type: string, required: false, description: "Filter by tag" }

  - name: grafana_get_dashboard
    description: Get a Grafana dashboard by UID including all panels and queries
    parameters:
      uid: { type: string, required: true, description: "Dashboard UID" }

  - name: grafana_create_dashboard
    description: Create a new Grafana dashboard with panels and data sources
    parameters:
      title: { type: string, required: true, description: "Dashboard title" }
      panels: { type: string, required: true, description: "JSON panel definitions" }
      folder_id: { type: string, required: false, description: "Folder ID" }

  - name: grafana_list_alerts
    description: List all Grafana alert rules with optional state filtering
    parameters:
      state: { type: string, required: false, description: "Filter by state (alerting, pending, normal)" }

  - name: grafana_get_alert
    description: Get details of a specific Grafana alert rule
    parameters:
      uid: { type: string, required: true, description: "Alert rule UID" }

  - name: grafana_silence_alert
    description: Create a silence for a Grafana alert to suppress notifications
    parameters:
      matchers: { type: string, required: true, description: "JSON label matchers" }
      starts_at: { type: string, required: true, description: "Silence start time" }
