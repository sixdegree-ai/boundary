# Model registry. Add new models here.
#
# IMPORTANT: Pricing changes frequently. These values are approximate and were
# last verified on 2026-03-21. Always check your provider's pricing page before
# running large benchmarks:
#   - https://platform.claude.com/docs/en/about-claude/pricing
#   - https://developers.openai.com/api/docs/pricing
#   - https://docs.x.ai/developers/models
#   - https://ai.google.dev/pricing
#
# provider: which API adapter to use (anthropic, openai, xai, gemini)
# aliases: shortcut names for the CLI
# pricing: cost per million tokens (input, output, cache_read, cache_write)

models:
